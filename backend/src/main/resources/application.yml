server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/specflow?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
  sql:
    init:
      mode: never

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: specflow-jwt-secret-key-must-be-at-least-256-bits-long!!
  expiration: 604800000

llm:
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:your-deepseek-key}
    model: deepseek-chat
    base-url: https://api.deepseek.com
  qwen:
    api-key: ${QWEN_API_KEY:your-qwen-key}
    model: qwen-plus

specflow:
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000

knife4j:
  enable: true
  setting:
    language: zh_cn
  openapi:
    title: SpecFlow 接口文档
    description: AI 驱动的软件开发生命周期治理平台
    version: 1.0.0
    contact:
      name: SpecFlow Team
